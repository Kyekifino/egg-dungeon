<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EGG DUNGEON</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <span id="title">EGG DUNGEON</span>
      <span id="controls">WASD / Arrows: move &nbsp;·&nbsp; F: feed egg &nbsp;·&nbsp; R: new game</span>
    </div>

    <div id="game-view">
      <pre id="viewport"></pre>
      <div id="sidebar">

        <div class="panel">
          <div class="panel-title">INVENTORY</div>
          <div id="inv-list"></div>
        </div>

        <div class="panel">
          <div class="panel-title">THE EGG</div>
          <div id="egg-mini">Θ</div>
          <div id="egg-bar"></div>
          <div id="egg-fed"></div>
          <div id="egg-hint"></div>
        </div>

        <div class="panel">
          <div class="panel-title">LOG</div>
          <div id="log"></div>
        </div>

      </div>
    </div>

    <div id="hatch-view" hidden>
      <div id="hatch-content"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
