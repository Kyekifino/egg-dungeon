name: Release check

on:
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Smoke test
        run: node smoke.js

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Verify patch notes for current version
        run: |
          node --input-type=module - << 'EOF'
          import { readFileSync } from 'fs';
          const src = readFileSync('modules/utils.js', 'utf8');
          const m = src.match(/export const VERSION = '([0-9]+\.[0-9]+)'/);
          if (!m) { console.log('VERSION not found — skipping patch notes check'); process.exit(0); }
          const ver = m[1];
          const pnIdx = src.indexOf('export const PATCH_NOTES');
          const pnSection = pnIdx !== -1 ? src.slice(pnIdx, pnIdx + 4000) : '';
          if (!pnSection.includes("'" + ver + "'")) {
            console.error('ERROR: No patch notes entry for v' + ver);
            console.error("Add PATCH_NOTES['" + ver + "'] to modules/utils.js before releasing.");
            process.exit(1);
          }
          console.log('Patch notes found for v' + ver + ' ✓');
          EOF
